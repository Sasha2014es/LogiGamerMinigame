<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>LogiGamer</title>
    <style>
        /* Основні стилі */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: #121212; 
            color: white; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрує все по горизонталі */
        }

        h1, h2 { text-align: center; color: #673ab7; margin-top: 40px; }

        /* Навігація */
        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Щоб посилання переносилися на мобільних */
            background: rgba(30, 30, 30, 0.9);
            padding: 15px;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        nav a {
            color: #bbb;
            text-decoration: none;
            padding: 10px 20px;
            margin: 5px;
            transition: 0.3s;
            font-weight: bold;
            border-radius: 20px;
        }
        nav a:hover { color: #fff; background: #673ab7; }

        /* Контейнери ігор */
        .game-container {
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
            text-align: center;
        }

        /* Кнопки */
        button {
            background: #673ab7;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { background: #8e44ad; transform: scale(1.05); }

        /* Ефекти */
        #particle-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .particle { position: absolute; background-color: rgba(103, 58, 183, 0.6); border-radius: 50%; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>
</head>
<body>

    <h1>LogiGamer</h1>
     <nav>
        <a href="https://sasha2014es.github.io/LogiGamerlogin/">Увійти</a>
        <a href="https://sasha2014es.github.io/LogiGamergolovna/">Головна</a>
        <a href="https://sasha2014es.github.io/LogiGamerEkchn/">Екшн</a>
        <a href="https://sasha2014es.github.io/LogiGamerRpg/">RPG</a>
        <a href="https://sasha2014es.github.io/LogiGamerstrategi/">Стратегії</a>
        <a href="https://sasha2014es.github.io/LogiGamersimulator/">Симулятори</a>
        <a href="https://sasha2014es.github.io/LogiGamerprugodu/">Пригоди</a>
        <a href="https://sasha2014es.github.io/LogiGamerarcade/">Аркади</a>
        <a href="https://sasha2014es.github.io/LogiGamergolova/">Головоломки</a>
        <a href="https://sasha2014es.github.io/LogiGamerMinigame/">Міні гра</a>
        <a href="https://t.me/LogiGamerbot">Допомога</a>
    </nav>
    <!-- Колесо -->
    <h2>Game 1: Колесо фортуни</h2>
    <div class="game-container">
        <div id="wheel" style="width: 150px; height: 150px; border-radius: 50%; border: 5px solid #333; background: conic-gradient(#ffcdd2 0% 25%, #c8e6c9 25% 50%, #bbdefb 50% 75%, #ffe0b2 75% 100%); margin: 0 auto 20px auto; transition: transform 3s cubic-bezier(0.1, 0.8, 0.3, 1);"></div>
        <button id="spin-btn">Крутити! 🎰</button>
        <p id="wheel-result"></p>
    </div>

    <!-- Звук -->
    <h2>Game 2: Зв'язок з Землею</h2>
    <div class="game-container">
        <button onclick="controlMusic()" id="music-btn">📡 Увімкнути аудіо</button>
    </div>

    <!-- Клікер -->
    <h2>Game 3: Стім клікер</h2>
    <div class="game-container">
        <h3>Інтернет клікер 🕹️</h3>
        <p>Грошей в стім: <span id="score" style="font-size: 20px;">0</span></p>
        <button id="click-btn">Клікни мене!</button>
    </div>

    <h2>Game 4(Майн урон)</h2>
            <div class="game-container">
                
    <iframe width="110" height="200" src="https://www.myinstants.com/instant/minecraft-damage-6455/embed/" frameborder="0" scrolling="no"></iframe>
</div>
    <!-- Частинки -->
    <div id="particle-container"></div>

    <script>
        // Логіка колеса
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spin-btn');
        let currentRotation = 0;
        spinBtn.addEventListener('click', () => {
            currentRotation += 1080 + Math.floor(Math.random() * 360);
            wheel.style.transform = `rotate(${currentRotation}deg)`;
        });

        // Логіка клікера
        let count = 0;
        document.getElementById('click-btn').addEventListener('click', () => {
            count++;
            document.getElementById('score').textContent = count;
        });

        // Частинки
        function createParticle() {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.width = p.style.height = Math.random() * 5 + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.getElementById('particle-container').appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
        setInterval(createParticle, 200);
    </script>
</body>
</html>
